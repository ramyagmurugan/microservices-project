spring.application.name=AuthServer

server.port=9000
spring.security.oauth2.authorizationserver.issuer=http://localhost:9000
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

####################################################
# Swagger
####################################################

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

####################################################
# Actuator
####################################################

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

management.info.env.enabled=true

info.app.name=${spring.application.name}
info.app.version=1.0
info.app.description=Order Management System Microservice

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.oauth.client-id=order-client
springdoc.swagger-ui.oauth.client-secret=secret

springdoc.swagger-ui.persistAuthorization=true


